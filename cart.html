<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:20px; }

.box {
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.item { display:flex; justify-content:space-between; margin:10px 0; }

button {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  margin-top:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Checkout</h2>
  <div id="items"></div>
  <h3 id="total"></h3>

  <button onclick="pay()">Pay Now</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let itemsBox = document.getElementById("items");
let total = 0;

cart.forEach(i => {
  total += i.price * i.qty;
  itemsBox.innerHTML += `
    <div class="item">
      <span>${i.name} x ${i.qty}</span>
      <span>$${i.price * i.qty}</span>
    </div>
  `;
});

document.getElementById("total").innerText = "Total: $" + total;

function pay(){
  alert("Stripe will be connected here next step 💳");
}
</script>

</body>
</html>
