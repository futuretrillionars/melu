<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | MELU</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body {
  background: #050505;
  color: white;
}
</style>
</head>

<body class="p-6 md:p-12">

<h1 class="text-3xl mb-10">Your Cart</h1>

<div id="cartItems" class="space-y-6"></div>

<div class="mt-10 border-t pt-6">
  <div class="flex justify-between text-xl mb-6">
    <span>Total</span>
    <span id="cartTotal">$0</span>
  </div>

  <button onclick="checkout()" class="w-full bg-white text-black py-4">
    Place Order
  </button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("cartTotal");

    container.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        container.innerHTML = `<p class="opacity-60">Your cart is empty</p>`;
        totalEl.innerText = "$0";
        return;
    }

    cart.forEach((item, index) => {
        const price = Number(item.price.replace(/[^0-9.]/g, ""));
        total += price * item.qty;

        container.innerHTML += `
        <div class="border-b pb-6 flex gap-4">

            <img src="${item.img}" class="h-32 w-32 object-cover rounded-lg">

            <div class="flex-1">
                <h2 class="text-lg">${item.title}</h2>
                <p class="opacity-60">${item.price}</p>

                <div class="flex justify-between items-center mt-4">
                    <div class="flex gap-3 items-center">
                        <button onclick="changeQty(${index}, -1)" class="px-3 bg-gray-700">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="px-3 bg-gray-700">+</button>
                    </div>

                    <button onclick="removeItem(${index})" class="text-red-400 text-sm">
                        Remove
                    </button>
                </div>
            </div>

        </div>
        `;
    });

    totalEl.innerText = "$" + total.toFixed(2);
}

function changeQty(i, change) {
    cart[i].qty += change;

    if (cart[i].qty <= 0) {
        cart.splice(i, 1);
    }

    update();
}

function removeItem(i) {
    cart.splice(i, 1);
    update();
}

function update() {
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function checkout() {
    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    let msg = "New Order:\n\n";

    cart.forEach(item => {
        msg += `${item.title} x${item.qty} - ${item.price}\n`;
    });

    msg += "\nSend Name, Phone, Address.";

    alert(msg);

    localStorage.removeItem("cart");
    cart = [];
    renderCart();
}

renderCart();
</script>

</body>
</html>
