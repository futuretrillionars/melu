<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart | MELU</title>
  <div class="flex flex-wrap gap-6 text-xs text-gray-400 mb-10 tracking-widest">
  <span>🔒 SECURE PAYMENT</span>
  <span>🚚 FAST DELIVERY</span>
  <span>↩ EASY RETURNS</span>
  <span>💎 PREMIUM HANDCRAFTED PIECES</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body {
  background: #050505;
  color: white;
  font-family: Inter, sans-serif;
}
</style>
</head>

<body class="p-6 md:p-12">

<h1 class="text-5xl font-light tracking-[0.3em] mb-4">SHOPPING BAG</h1>

<p class="text-gray-400 mb-10">
  Complimentary delivery on all Ethiopian orders over $100
</p>

<div id="cartItems" class="space-y-6"></div>

<div class="mt-10 border-t pt-6">
  <div class="flex justify-between text-xl mb-6">
    <span>Total</span>
    <span id="cartTotal">$0.00</span>
  </div>
<div class="mt-8 space-y-4">
  <input id="name" placeholder="Full Name" class="w-full p-3 bg-gray-900 border border-gray-700 rounded">
  <input id="phone" placeholder="Phone Number" class="w-full p-3 bg-gray-900 border border-gray-700 rounded">
  <input id="address" placeholder="Delivery Address" class="w-full p-3 bg-gray-900 border border-gray-700 rounded">
</div>
  <button onclick="checkout()" class="w-full bg-white text-black py-4 font-bold">
    Place Order
  </button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getPrice(item) {
    if (!item || !item.price) return 0;

    if (typeof item.price === "number") return item.price;

    if (typeof item.price === "string") {
        const cleaned = item.price.replace(/[^0-9.]/g, "");
        return parseFloat(cleaned) || 0;
    }

    return 0;
}

function renderCart() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("cartTotal");

    container.innerHTML = "";
    let total = 0;

    if (!cart.length) {
        container.innerHTML = `<p class="opacity-60">Your cart is empty</p>`;
        totalEl.innerText = "$0.00";
        return;
    }

    cart.forEach((item, index) => {

        const price = getPrice(item);
        const qty = item.qty || 1;

        total += price * qty;

        container.innerHTML += `
        <div class="border-b pb-6 flex gap-4">

            <img src="${item.img}" class="h-28 w-28 object-cover rounded-lg">

            <div class="flex-1">
                <h2 class="text-lg">${item.title || "Item"}</h2>
                <p class="opacity-60">$${price.toFixed(2)}</p>

                <div class="flex justify-between items-center mt-4">

                    <div class="flex items-center gap-3">
                        <button onclick="changeQty(${index}, -1)" class="px-3 bg-gray-700">-</button>
                        <span>${qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="px-3 bg-gray-700">+</button>
                    </div>

                    <button onclick="removeItem(${index})" class="text-red-400 text-sm">
                        Remove
                    </button>

                </div>
            </div>

        </div>
        `;
    });

    totalEl.innerText = "$" + total.toFixed(2);
}

function changeQty(i, change) {
    if (!cart[i]) return;

    cart[i].qty = (cart[i].qty || 1) + change;

    if (cart[i].qty <= 0) {
        cart.splice(i, 1);
    }

    update();
}

function removeItem(i) {
    cart.splice(i, 1);
    update();
}

function update() {
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

  
function checkout() {
    if (!cart.length) {
        alert("Cart is empty");
        return;
    }

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if (!name || !phone || !address) {
        alert("Fill all details");
        return;
    }

    let msg = `🛒 NEW ORDER\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}\n\nItems:\n`;

    cart.forEach(item => {
        const price = getPrice(item);
        const qty = item.qty || 1;

        msg += `- ${item.title} x${qty} = $${price * qty}\n`;
    });

    let total = cart.reduce((sum, item) => {
        return sum + getPrice(item) * (item.qty || 1);
    }, 0);

    msg += `\nTOTAL: $${total.toFixed(2)}`;

    let phoneNumber = "251911001122"; // change this

    window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(msg)}`);

    localStorage.removeItem("cart");
    cart = [];
    renderCart();
}

renderCart();
</script>
  

</body>
</html>
