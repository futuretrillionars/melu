<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-black text-white p-10">

<div class="grid md:grid-cols-2 gap-16 max-w-6xl mx-auto mt-20">

  <!-- IMAGE -->
  <div>
    <img id="productImg" class="w-full object-cover rounded-lg">
  </div>

  <!-- DETAILS -->
  <div class="space-y-6">

    <h1 id="productTitle" class="text-3xl tracking-wide font-light"></h1>

    <p id="productPrice" class="text-xl text-gray-300"></p>

    <p class="text-gray-400 leading-relaxed">
      Handcrafted Ethiopian garment blending heritage with modern luxury.
      Designed for comfort, elegance, and timeless style.
    </p>

    <!-- SIZE -->
    <div>
      <p class="text-sm text-gray-400 mb-3 tracking-widest">SIZE</p>

      <div class="flex gap-3">
        <button class="size-btn border px-4 py-2">S</button>
        <button class="size-btn border px-4 py-2">M</button>
        <button class="size-btn border px-4 py-2">L</button>
        <button class="size-btn border px-4 py-2">XL</button>
      </div>
    </div>

    <!-- ADD BUTTON -->
    <button onclick="addToCart()"
      class="w-full border border-white py-4 tracking-widest hover:bg-white hover:text-black transition">
      ADD TO BAG
    </button>

  </div>

</div>

<script>
let product = JSON.parse(localStorage.getItem("selectedProduct"));
  let selectedSize = null;

document.getElementById("productImg").src = product.img;
document.getElementById("productTitle").innerText = product.title;
document.getElementById("productPrice").innerText = product.price;
  document.querySelectorAll(".size-btn").forEach(button => {
  button.onclick = () => {

    // remove highlight from all buttons
    document.querySelectorAll(".size-btn").forEach(b => {
      b.style.background = "";
      b.style.color = "";
    });

    // highlight clicked button
    button.style.background = "white";
    button.style.color = "black";

    // remember size
    selectedSize = button.innerText;
  };
});

function addToCart() {

  if (!selectedSize) {
    alert("Please select a size");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    img: product.img,
    title: product.title,
    price: product.price,
    qty: 1,
    size: selectedSize
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}
</script>

</body>
</html>
